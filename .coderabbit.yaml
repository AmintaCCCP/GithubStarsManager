# CodeRabbit 全局配置
language: Chinese
reviews:
  auto_review: true
  profile: balanced
  high_level_summary: true
  review_status: true
  poem: false
  walkthrough: true

# 自动总结 PR、代码解释
knowledge_base:
  enabled: true

# 忽略不需要审查的文件
ignore:
  - "*.md"
  - "docs/**"
  - "static/**"
  - "assets/**"
  - "node_modules/**"
  - "dist/**"
  - "build/**"

# 审查规则：风格、安全、性能
rules:
  style:
    enabled: true
  security:
    enabled: true
  performance:
    enabled: true
  best_practices:
    enabled: true
