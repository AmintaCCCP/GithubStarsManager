version: '3.8'

services:
  frontend:
    image: lost4/gitstars:latest
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: lost4/gitstars:backend
    expose:
      - "3000"
    environment:
      - API_SECRET=${API_SECRET:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

volumes:
  backend-data: