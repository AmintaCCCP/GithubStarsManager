version: '3.8'

services:
  app:
    # To build locally, comment 'image' and uncomment 'build'
    image: banjuer/github-stars-manager:latest
    # build: .
    ports:
      - "8080:3000"
    environment:
      - API_SECRET=${API_SECRET:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    volumes:
      - app-data:/app/data
    restart: unless-stopped

volumes:
  app-data: